<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Dark subtle background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    
    <!-- Cyber accent text gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#238636"/>
      <stop offset="100%" stop-color="#2ea043"/>
    </linearGradient>

    <!-- Subtle background grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- Decorative network nodes to represent the isolated virtual network -->
  <g opacity="0.4">
    <circle cx="950" cy="150" r="4" fill="#2ea043"/>
    <circle cx="1050" cy="220" r="6" fill="#2ea043"/>
    <circle cx="900" cy="280" r="3" fill="#2ea043"/>
    <path d="M950 150 L1050 220 L900 280 Z" fill="none" stroke="#2ea043" stroke-width="1" opacity="0.3"/>
  </g>
  
  <!-- Project Title -->
  <text x="80" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="56" font-weight="bold" fill="#c9d1d9">SOC Home Lab</text>
  
  <!-- Project Subtitle -->
  <text x="80" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="28" font-weight="600" fill="url(#accentGradient)">Splunk SIEM + Sysmon Endpoint Monitoring</text>
  
  <!-- Project Tagline -->
  <text x="80" y="280" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#8b949e">Simulating real-world log collection, telemetry analysis, and threat detection workflows.</text>
  
  <!-- Author Brand -->
  <text x="1120" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="16" font-weight="600" fill="#484f58" text-anchor="end">MonkEncrypts</text>
</svg>
