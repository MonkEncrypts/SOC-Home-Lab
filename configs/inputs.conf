# Splunk Universal Forwarder — inputs.conf
# Location on endpoint: C:\Program Files\SplunkUniversalForwarder\etc\system\local\inputs.conf
#
# Purpose: Forward only the Sysmon Operational event log channel to the
# Splunk Enterprise indexer. Scoped intentionally to a single high-value
# log source — see docs/07-log-forwarding/inputs-conf-config.md for the
# full rationale.

[WinEventLog://Microsoft-Windows-Sysmon/Operational]
disabled = false
index = main
sourcetype = WinEventLog:Microsoft-Windows-Sysmon/Operational
